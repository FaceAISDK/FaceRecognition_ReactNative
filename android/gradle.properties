# Project-wide Gradle settings.

# Specifies the JVM arguments used for the daemon process.
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# Enable parallel execution to speed up builds
org.gradle.parallel=true
# Enable configuration caching for faster subsequent builds
org.gradle.configuration-cache=true
# Enable build caching
org.gradle.caching=true

# AndroidX support
android.useAndroidX=true

# Only build for the necessary architectures to save time during local development
# Face SDK usually requires arm64-v8a for performance
reactNativeArchitectures=arm64-v8a,armeabi-v7a

# New architecture settings
newArchEnabled=true
hermesEnabled=true

# React Native 0.77+ 16KB 页面对齐支持
android.bundle.enableUncompressedNativeLibs=true
android.useLegacyPackaging=false
